<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐕 Dog Trend Radar</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #e17055;
    --products: #e17055;
    --services: #00cec9;
    --health: #6c5ce7;
    --tech: #fdcb6e;
    --up: #00b894;
    --down: #e17055;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  h1 { font-size: 28px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .last-updated { color: var(--muted); font-size: 13px; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .stat-card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 32px; font-weight: 700; margin: 8px 0; }
  .stat-card .sub { font-size: 13px; color: var(--muted); }
  .domain-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .domain-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .domain-dot { width: 12px; height: 12px; border-radius: 50%; }
  .domain-header h2 { font-size: 18px; }
  .chart-wrapper { position: relative; height: 280px; margin-bottom: 16px; }
  .rising-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px; margin-top: 12px;
  }
  .rising-item {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .rising-item .query { font-weight: 600; font-size: 14px; }
  .rising-item .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .rising-item .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin-top: 6px;
  }
  .badge.breakout { background: rgba(0,184,148,0.15); color: var(--up); }
  .badge.rising { background: rgba(108,92,231,0.15); color: var(--health); }
  .signal-banner {
    background: linear-gradient(135deg, rgba(225,112,85,0.15), rgba(0,184,148,0.1));
    border: 1px solid var(--accent); border-radius: 12px; padding: 16px 20px;
    margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
  }
  .signal-banner .icon { font-size: 28px; }
  .signal-banner h3 { font-size: 15px; margin-bottom: 4px; }
  .signal-banner p { font-size: 13px; color: var(--muted); }
  .empty-state { color: var(--muted); font-style: italic; padding: 40px; text-align: center; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 14px;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .keyword-table {
    width: 100%; border-collapse: collapse; margin-top: 12px;
  }
  .keyword-table th, .keyword-table td {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .keyword-table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .keyword-table .change-up { color: var(--up); }
  .keyword-table .change-down { color: var(--down); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>🐕 Dog Trend <span>Radar</span></h1>
      <p style="color:var(--muted); font-size:14px; margin-top:4px;">
        Products · Services · Health · Tech & Investments
      </p>
    </div>
    <div class="last-updated" id="lastUpdated">Loading data...</div>
  </header>

  <div class="signal-banner" id="signalBanner" style="display:none;">
    <div class="icon" id="signalIcon">🔔</div>
    <div>
      <h3 id="signalTitle"></h3>
      <p id="signalBody"></p>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="all">🐾 All</button>
    <button class="tab" data-tab="dog_products">🛒 Products</button>
    <button class="tab" data-tab="dog_services">💈 Services</button>
    <button class="tab" data-tab="dog_health">🏥 Health</button>
    <button class="tab" data-tab="dog_tech_investment">💼 Tech & Investment</button>
  </div>

  <div id="domainsContainer"></div>
</div>

<script>
// ── Config ──
const DOMAINS = {
  dog_products:       { label: '🛒 Dog Products',        color: '#e17055' },
  dog_services:       { label: '💈 Dog Services',        color: '#00cec9' },
  dog_health:         { label: '🏥 Dog Health & Owners', color: '#6c5ce7' },
  dog_tech_investment:{ label: '💼 Tech & Investment',   color: '#fdcb6e' },
};

let allTrends = [];
let allRising = [];
let summary = null;
let charts = {};

// ── Load data ──
async function loadData() {
  try {
    const trendsRes = await fetch('data/all_trends.csv');
    if (trendsRes.ok) {
      const csv = await trendsRes.text();
      const parsed = Papa.parse(csv, { header: true, dynamicTyping: true });
      allTrends = parsed.data.filter(d => d.keyword && d.interest !== null);
    }

    // Rising queries (optional — populated by cron web searches)
    try {
      const risingRes = await fetch('data/all_rising.csv');
      if (risingRes.ok) {
        const csv = await risingRes.text();
        const parsed = Papa.parse(csv, { header: true, dynamicTyping: true });
        allRising = parsed.data.filter(d => d.query);
      }
    } catch(e) { /* rising data is optional */ }

    const summaryRes = await fetch('data/summary.json');
    if (summaryRes.ok) {
      summary = await summaryRes.json();
      document.getElementById('lastUpdated').textContent =
        'Last scrape: ' + new Date(summary.scraped_at).toLocaleString();
    }

    renderAll();
  } catch (e) {
    document.getElementById('lastUpdated').textContent = 'No data yet — waiting for first scrape';
    document.getElementById('domainsContainer').innerHTML =
      '<div class="empty-state">🐶 No data yet. The first scrape (9 AM or 1 PM MST) will populate this dashboard.</div>';
  }
}

// ── Render ──
function renderAll() {
  renderSignalBanner();
  renderStats();
  renderDomains('all');
}

function renderSignalBanner() {
  const banner = document.getElementById('signalBanner');
  if (!summary?.trend_movers?.length) {
    banner.style.display = 'none';
    return;
  }

  banner.style.display = 'flex';
  const topMover = summary.trend_movers[0];

  if (Math.abs(topMover.change_pct) > 20) {
    document.getElementById('signalIcon').textContent = topMover.change_pct > 0 ? '🚀' : '📉';
    document.getElementById('signalTitle').textContent =
      `"${topMover.keyword}" ${topMover.change_pct > 0 ? 'surging' : 'dropping'} ${Math.abs(topMover.change_pct)}% this month`;
    document.getElementById('signalBody').textContent =
      `Category: ${DOMAINS[topMover.category]?.label || topMover.category} · Recent avg interest: ${topMover.recent_avg}`;
  } else {
    document.getElementById('signalIcon').textContent = '📊';
    document.getElementById('signalTitle').textContent =
      `"${topMover.keyword}" trending ${topMover.change_pct > 0 ? 'up' : 'down'} ${Math.abs(topMover.change_pct)}%`;
    document.getElementById('signalBody').textContent =
      `Category: ${DOMAINS[topMover.category]?.label || topMover.category}`;
  }
}

function renderStats() {
  const grid = document.getElementById('statsGrid');
  let html = '';

  for (const [key, domain] of Object.entries(DOMAINS)) {
    const trends = allTrends.filter(d => d.category === key);
    const keywords = [...new Set(trends.map(d => d.keyword))];

    let moverHtml = '';
    if (summary?.trend_movers) {
      const movers = summary.trend_movers.filter(m => m.category === key);
      if (movers.length > 0) {
        const top = movers[0];
        const dir = top.change_pct > 0 ? '▲' : '▼';
        moverHtml = `<div class="sub">${dir} ${top.keyword}: ${top.change_pct > 0 ? '+' : ''}${top.change_pct}%</div>`;
      }
    }

    html += `
      <div class="stat-card">
        <h3>${domain.label}</h3>
        <div class="value" style="color:${domain.color}">${keywords.length}</div>
        <div class="sub">keywords tracked</div>
        ${moverHtml}
      </div>`;
  }

  grid.innerHTML = html;
}

function renderDomains(tab) {
  const container = document.getElementById('domainsContainer');
  let html = '';

  for (const [key, domain] of Object.entries(DOMAINS)) {
    if (tab !== 'all' && tab !== key) continue;

    const trends = allTrends.filter(d => d.category === key);
    const rising = allRising.filter(d => d.category === key);

    html += `
      <div class="domain-section">
        <div class="domain-header">
          <div class="domain-dot" style="background:${domain.color}"></div>
          <h2>${domain.label}</h2>
        </div>
        <div class="chart-wrapper">
          <canvas id="chart_${key}"></canvas>
        </div>
        ${renderKeywordTable(key)}
        ${rising.length > 0 ? renderRisingSection(rising, key) : ''}
      </div>`;
  }

  if (!html) {
    html = '<div class="empty-state">No data for this category yet.</div>';
  }

  container.innerHTML = html;

  setTimeout(() => {
    for (const [key] of Object.entries(DOMAINS)) {
      if (tab !== 'all' && tab !== key) continue;
      renderChart(key);
    }
  }, 50);
}

function renderKeywordTable(category) {
  if (!summary?.keyword_snapshot) return '';

  const rows = [];
  for (const [key, snap] of Object.entries(summary.keyword_snapshot)) {
    if (!key.startsWith(category + '/')) continue;
    const kw = key.replace(category + '/', '');
    // Find movement from trend_movers
    const mover = (summary.trend_movers || []).find(m => m.keyword === kw && m.category === category);
    const chgStr = mover
      ? `<span class="${mover.change_pct > 0 ? 'change-up' : 'change-down'}">${mover.change_pct > 0 ? '+' : ''}${mover.change_pct}%</span>`
      : '<span style="color:var(--muted)">—</span>';
    rows.push({ kw, latest: snap.latest, week_avg: snap.week_avg, chgStr, mover });
  }

  if (!rows.length) return '';

  // Sort by latest interest descending
  rows.sort((a, b) => (b.latest || 0) - (a.latest || 0));

  return `
    <table class="keyword-table">
      <thead><tr><th>Keyword</th><th>Latest</th><th>Week Avg</th><th>30d Change</th></tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${r.kw}</td>
            <td>${r.latest}</td>
            <td>${r.week_avg !== null ? r.week_avg : '—'}</td>
            <td>${r.chgStr}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function renderRisingSection(rising, category) {
  const grouped = {};
  rising.forEach(r => {
    if (!grouped[r.seed_keyword]) grouped[r.seed_keyword] = [];
    grouped[r.seed_keyword].push(r);
  });

  let html = '';
  for (const [seed, items] of Object.entries(grouped)) {
    const top = items.slice(0, 3);
    top.forEach(item => {
      const badgeClass = item.value >= 500 ? 'breakout' : 'rising';
      const badgeLabel = item.value >= 500 ? 'BREAKOUT' : `+${item.value}%`;
      html += `
        <div class="rising-item">
          <div class="query">${item.query}</div>
          <div class="meta">from "${seed}"</div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>`;
    });
  }

  return `
    <h3 style="font-size:14px; color:var(--muted); margin:16px 0 8px;">🔥 Rising Queries</h3>
    <div class="rising-list">${html}</div>`;
}

function renderChart(category) {
  const canvasId = `chart_${category}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const trends = allTrends.filter(d => d.category === category);
  if (!trends.length) return;

  if (charts[canvasId]) charts[canvasId].destroy();

  const keywordData = {};
  trends.forEach(d => {
    if (!keywordData[d.keyword]) keywordData[d.keyword] = [];
    keywordData[d.keyword].push({ date: d.date, interest: d.interest });
  });

  // Top 8 keywords by average interest
  const ranked = Object.entries(keywordData)
    .map(([kw, pts]) => ({
      keyword: kw,
      avg: pts.reduce((s, p) => s + p.interest, 0) / pts.length,
      points: pts.sort((a, b) => new Date(a.date) - new Date(b.date))
    }))
    .sort((a, b) => b.avg - a.avg)
    .slice(0, 8);

  if (!ranked.length) return;

  const dates = ranked[0].points.map(p => p.date);

  const datasets = ranked.map((kw, i) => ({
    label: kw.keyword,
    data: dates.map(date => {
      const pt = kw.points.find(p => p.date === date);
      return pt ? pt.interest : null;
    }),
    borderColor: adjustColor(DOMAINS[category].color, i, ranked.length),
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 0,
    tension: 0.3,
  }));

  charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#888', usePointStyle: true, padding: 16, font: { size: 11 } }
        },
      },
      scales: {
        x: {
          ticks: { color: '#555', maxTicksLimit: 10, font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.03)' }
        },
        y: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.03)' },
          title: { display: true, text: 'Interest (0-100)', color: '#555' }
        }
      }
    }
  });
}

function adjustColor(hex, index, total) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const factor = total > 1 ? index / (total - 1) : 0.5;
  const opacity = 1 - factor * 0.6;
  return `rgba(${r},${g},${b},${Math.max(0.3, opacity)})`;
}

// ── Tab switching ──
document.getElementById('tabs').addEventListener('click', e => {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    const tab = e.target.dataset.tab;
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
    renderDomains(tab);
  }
});

// ── Init ──
loadData();
setInterval(loadData, 15 * 60 * 1000);
</script>
</body>
</html>
